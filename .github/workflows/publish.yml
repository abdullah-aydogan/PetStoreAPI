name: Build and Deploy Docs & Allure Report

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write      
      id-token: write   

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Newman and Allure reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-allure

      - name: 4. Run API tests to generate Allure results
        run: newman run PetStore_Collection.json -e PetStore_Environment.json -r cli,allure

      # ALLURE RAPORUNU MANUEL OLUŞTURMA (DOCKER'SIZ)
      - name: 5. Set up JDK for Allure
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 6. Generate Allure Report (Manual)
        run: |
          # Allure komut satırı aracını indir ve kur
          wget https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz
          tar -zxvf allure-2.24.1.tgz
          
          # Raporu oluştur ve doğrudan yayınlanacak klasöre koy
          ./allure-2.24.1/bin/allure generate allure-results --clean -o artifact/report

      # DOKÜMANTASYON VE ANA SAYFAYI HAZIRLAMA
      - name: 7. Prepare documentation and index page
        run: |
          # Dokümantasyon klasörünü oluştur
          mkdir -p artifact/docs
          echo "<h1>Dokümantasyon</h1><p>Bu sayfa otomatik olarak oluşturulmuştur.</p>" > artifact/docs/index.html
          
          # Ana sayfayı kopyala
          cp index.html artifact/

      # GITHUB PAGES'E YAYINLAMA
      - name: 8. Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./artifact

      - name: 9. Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
