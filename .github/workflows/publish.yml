name: Build and Deploy Docs & Allure Report

on:
  push:
    branches:
      - main # Veya master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write      
      id-token: write   

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      # API TESTLERİNİ ÇALIŞTIRMA (api-tests.yml'den alındı)
      - name: 2. Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Install Newman and Allure reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-allure

      - name: 4. Run API tests to generate Allure results
        # continue-on-error: true # Testler başarısız olsa bile rapor yayınlansın istiyorsanız bu satırı açın
        run: newman run PetStore_Collection.json -e PetStore_Environment.json -r cli,allure

      # DOKÜMANTASYON OLUŞTURMA
      - name: 5. Build Documentation (Placeholder)
        run: |
          echo "Dokümantasyon oluşturma adımı."
          mkdir -p artifact/docs
          echo "<h1>Dokümantasyon</h1><p>Bu sayfa otomatik olarak oluşturulmuştur.</p>" > artifact/docs/index.html

      # ALLURE RAPORU OLUŞTURMA
      - name: 6. Generate Allure Report
        uses: simple-elf/allure-report-action@v1.7
        with:
          results_path: allure-results # Newman varsayılan olarak bu klasöre oluşturur
          report_path: artifact/report  # Raporu doğrudan yayınlanacak klasörün içine oluştur

      # YAYINLAMA İÇİN DOSYALARI HAZIRLAMA
      - name: 7. Prepare final artifact
        run: |
          # Ana sayfayı kopyala
          cp index.html artifact/
          
          # allure-results klasörünü temizle (artifakta eklenmesin)
          rm -rf allure-results

      # GITHUB PAGES'E YAYINLAMA
      - name: 8. Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./artifact

      - name: 9. Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
