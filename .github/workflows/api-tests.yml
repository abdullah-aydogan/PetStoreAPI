name: Postman API Tests with Allure Report

on:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Newman ve Allure Kurulumu
        run: |
          npm install -g newman
          npm install -g newman-reporter-allure

      - name: API Testlerini Çalıştır
        continue-on-error: true
        run: newman run PetStore_Collection.json -e PetStore_Environment.json -r cli,allure

      - name: Allure Raporunu Oluştur (HTML)
        # Bu adım ham verileri HTML sayfasına dönüştürür
        run: |
          sudo apt-get update && sudo apt-get install -y default-jre
          wget https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz
          tar -zxvf allure-2.24.1.tgz
          ./allure-2.24.1/bin/allure generate allure-results --clean -o allure-report

      - name: GitHub Pages Ayarlarını Yap
        uses: actions/configure-pages@v4

      - name: Raporu GitHub Pages'e Yükle
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'allure-report'

      - name: Raporu Yayınla
        id: deployment
        uses: actions/deploy-pages@v4