<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proje Adı - Ana Sayfa</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #1a1a1a;
        }
        p {
            font-size: 1.1em;
            color: #555;
        }
        .links {
            margin-top: 30px;
        }
        .button {
            display: inline-block;
            text-decoration: none;
            background-color: #007bff;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            margin: 10px;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #0056b3;
        }
        .button-secondary {
            background-color: #6c757d;
        }
        .button-secondary:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PetStoreAPI Projesi</h1>
        <p>Proje dokümantasyonuna ve test raporlarına aşağıdaki bağlantılardan erişebilirsiniz.</p>
        <div class="links">
            <a href="./docs/" class="button">Dokümantasyon</a>
            <a href="./report/" class="button button-secondary">Allure Test Raporu</a>
        </div>
    </div>
</body>
</html>
